<svg width="700" height="560" viewBox="0 0 700 560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
<title>MCD complet du projet PrediBike</title>
<desc>Quatre entités : Accident au centre avec ses compteurs de véhicules agrégés, reliée en plusieurs-vers-un à Commune et à Condition météo, et reliée par requête spatiale dynamique à Aménagement cyclable.</desc>

<rect width="700" height="560" fill="#ffffff"/>

<!-- COMMUNE -->
<rect x="40" y="40" width="220" height="150" rx="4" fill="none" stroke="#0d9488" stroke-width="1.5"/>
<rect x="40" y="40" width="220" height="32" rx="4" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5"/>
<text x="150" y="61" font-size="13" font-weight="bold" text-anchor="middle" fill="#134e4a">COMMUNE</text>
<line x1="40" y1="72" x2="260" y2="72" stroke="#0d9488" stroke-width="1"/>
<text x="55" y="90" font-size="11" fill="#333">code_insee</text>
<text x="55" y="108" font-size="11" fill="#333">nom_commune</text>
<text x="55" y="126" font-size="11" fill="#333">population</text>
<text x="55" y="144" font-size="11" fill="#333">superficie</text>
<text x="55" y="162" font-size="11" fill="#333">departement</text>

<!-- ACCIDENT -->
<rect x="340" y="180" width="240" height="220" rx="4" fill="none" stroke="#d97706" stroke-width="1.5"/>
<rect x="340" y="180" width="240" height="32" rx="4" fill="#fef3e2" stroke="#d97706" stroke-width="1.5"/>
<text x="460" y="201" font-size="13" font-weight="bold" text-anchor="middle" fill="#78350f">ACCIDENT</text>
<line x1="340" y1="212" x2="580" y2="212" stroke="#d97706" stroke-width="1"/>
<text x="355" y="230" font-size="11" fill="#333">id_accident</text>
<text x="355" y="248" font-size="11" fill="#333">date_heure</text>
<text x="355" y="266" font-size="11" fill="#333">latitude</text>
<text x="355" y="284" font-size="11" fill="#333">longitude</text>
<text x="355" y="302" font-size="11" fill="#333">gravite_max</text>
<line x1="355" y1="314" x2="565" y2="314" stroke="#d97706" stroke-width="0.5" stroke-dasharray="2,2"/>
<text x="355" y="330" font-size="11" fill="#333">nb_velos_muscu</text>
<text x="355" y="348" font-size="11" fill="#333">nb_velos_electriques</text>
<text x="355" y="366" font-size="11" fill="#333">nb_vehicules_motorises</text>
<text x="355" y="386" font-size="9" fill="#888">(compteurs calculés à l'ETL)</text>

<!-- CONDITION_METEO -->
<rect x="40" y="430" width="230" height="100" rx="4" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
<rect x="40" y="430" width="230" height="32" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
<text x="155" y="451" font-size="13" font-weight="bold" text-anchor="middle" fill="#4c1d95">CONDITION_METEO</text>
<line x1="40" y1="462" x2="270" y2="462" stroke="#7c3aed" stroke-width="1"/>
<text x="55" y="480" font-size="11" fill="#333">id_releve</text>
<text x="55" y="498" font-size="11" fill="#333">temperature</text>
<text x="55" y="516" font-size="11" fill="#333">precipitation_mm</text>

<!-- AMENAGEMENT_CYCLABLE -->
<rect x="430" y="430" width="240" height="100" rx="4" fill="none" stroke="#16a34a" stroke-width="1.5"/>
<rect x="430" y="430" width="240" height="32" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="550" y="451" font-size="13" font-weight="bold" text-anchor="middle" fill="#14532d">AMENAGEMENT_CYCLABLE</text>
<line x1="430" y1="462" x2="670" y2="462" stroke="#16a34a" stroke-width="1"/>
<text x="445" y="480" font-size="11" fill="#333">id_amenagement</text>
<text x="445" y="498" font-size="11" fill="#333">type_amenagement</text>
<text x="445" y="516" font-size="11" fill="#333">latitude / longitude</text>

<!-- Associations -->
<line x1="260" y1="130" x2="380" y2="220" stroke="#555" stroke-width="1"/>
<rect x="265" y="145" width="110" height="28" rx="14" fill="#f3f4f6" stroke="#999" stroke-width="0.5"/>
<text x="320" y="163" font-size="10" text-anchor="middle" fill="#333">se produit dans</text>
<text x="280" y="143" font-size="10" text-anchor="middle" fill="#555">0,n</text>
<text x="350" y="222" font-size="10" text-anchor="middle" fill="#555">1,1</text>

<line x1="270" y1="480" x2="340" y2="320" stroke="#555" stroke-width="1"/>
<rect x="250" y="385" width="110" height="28" rx="14" fill="#f3f4f6" stroke="#999" stroke-width="0.5"/>
<text x="305" y="403" font-size="10" text-anchor="middle" fill="#333">se déroule sous</text>
<text x="280" y="450" font-size="10" text-anchor="middle" fill="#555">0,n</text>
<text x="345" y="335" font-size="10" text-anchor="middle" fill="#555">1,1</text>

<line x1="500" y1="400" x2="500" y2="428" stroke="#555" stroke-width="1" stroke-dasharray="5,4"/>
<text x="500" y="420" font-size="10" text-anchor="middle" fill="#555">requête spatiale</text>

<!-- légende -->
<rect x="40" y="20" width="0" height="0"/>
<text x="40" y="545" font-size="10" fill="#888">Lien Accident ↔ Aménagement : non figé en association Merise, calculé à la demande (voir mcd.md)</text>

</svg>
