<rect x="50" y="672" width="180" height="44" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="1"/>
<text x="140" y="692" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Specs · Agile</text>
