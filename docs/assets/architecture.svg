<line x1="515" y1="528" x2="515" y2="546" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="370" y="552" width="290" height="24" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
