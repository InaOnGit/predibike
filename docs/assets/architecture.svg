<text x="340" y="692" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">app/frontend/</text>
<text x="340" y="708" font-size="10" text-anchor="middle" fill="#555">Streamlit (C17)</text>
<line x1="430" y1="694" x2="448" y2="694" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="450" y="672" width="200" height="44" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="1"/>
<text x="550" y="692" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">.github/workflows/</text>
<text x="550" y="708" font-size="10" text-anchor="middle" fill="#555">ci-app.yml (C18-C19)</text>

<line x1="340" y1="716" x2="340" y2="736" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
