<svg width="700" height="920" viewBox="0 0 700 920" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
<title>Architecture technique finale du projet PrediBike</title>
<desc>Trois blocs alignés sur l'arborescence du repo : data/ pour la collecte et l'API Data, ia/ pour le modèle et l'API IA avec MLOps, app/ pour l'application Streamlit consommée par l'utilisateur final, avec CI/CD et monitoring transverses.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect width="700" height="920" fill="#ffffff"/>

<!-- BLOC data/ -->
<rect x="30" y="30" width="640" height="240" rx="20" fill="none" stroke="#d97706" stroke-width="1.5"/>
<text x="50" y="58" font-size="16" font-weight="bold" fill="#d97706">data/  —  Bloc 1 (C1 à C5)</text>
<text x="50" y="76" font-size="12" fill="#92400e">Collecte, stockage, exposition</text>

<rect x="50" y="92" width="140" height="50" rx="10" fill="#fef3e2" stroke="#d97706" stroke-width="1"/>
<text x="120" y="112" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">CSV BAAC</text>
<text x="120" y="130" font-size="10" text-anchor="middle" fill="#555">extract_baac.py</text>

<rect x="200" y="92" width="140" height="50" rx="10" fill="#fef3e2" stroke="#d97706" stroke-width="1"/>
<text x="270" y="112" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">API météo</text>
<text x="270" y="130" font-size="10" text-anchor="middle" fill="#555">extract_meteo_api.py</text>

<rect x="350" y="92" width="140" height="50" rx="10" fill="#fef3e2" stroke="#d97706" stroke-width="1"/>
<text x="420" y="112" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Scraping</text>
<text x="420" y="130" font-size="10" text-anchor="middle" fill="#555">scrape_amenagements.py</text>

<rect x="500" y="92" width="150" height="50" rx="10" fill="#fef3e2" stroke="#d97706" stroke-width="1"/>
<text x="575" y="112" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">SQL INSEE</text>
<text x="575" y="130" font-size="10" text-anchor="middle" fill="#555">load_insee.py</text>

<path d="M120 142 L120 160 L420 160" fill="none" stroke="#666" stroke-width="1"/>
<line x1="270" y1="142" x2="270" y2="160" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="420" y1="142" x2="420" y2="160" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M575 142 L575 160 L460 160" fill="none" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="210" y="166" width="280" height="34" rx="8" fill="#fde8c8" stroke="#d97706" stroke-width="1"/>
<text x="350" y="187" font-size="12" text-anchor="middle" fill="#333">data/etl/ — pandas, ETL Python</text>
<line x1="350" y1="200" x2="350" y2="216" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="180" y="218" width="340" height="38" rx="10" fill="#fde8c8" stroke="#d97706" stroke-width="1.5"/>
<text x="350" y="241" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">data/database/ — PostgreSQL + PostGIS</text>

<line x1="350" y1="256" x2="350" y2="296" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
