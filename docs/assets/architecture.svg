<text x="515" y="512" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">App prototype Streamlit (C10)</text>

<line x1="200" y1="528" x2="200" y2="546" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="50" y="552" width="300" height="24" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
